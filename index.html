  <div class="video-bg" aria-hidden="true">
    <video id="bg-video" autoplay muted loop playsinline preload="auto" poster="img/carbones-poster.jpg">
      <source src="img/CARBONES_web.mp4" type="video/mp4" />
      <source src="img/CARBONES_web.webm" type="video/webm" />
    </video>
  </div>
  <script>
    (function(){
      var v=document.getElementById('bg-video');
      if(!v)return;
      v.muted=true;
      var p=v.play();
      if(p&&p.catch)p.catch(function(){
        ['touchstart','scroll','click'].forEach(function(evt){
          document.addEventListener(evt,function h(){
            v.play();
            document.removeEventListener(evt,h);
          },{once:true,passive:true});
        });
      });
    })();
  </script>

    </div>

  <!-- Cart FAB -->

    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>

    </svg>

  </button>



  <!-- ══════════════════════════════════════════════════════
       PRODUCT DETAIL MODAL (bottom sheet)
  ══════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sheet" id="modal-sheet">

      <button class="modal-close" id="modal-close" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>

      <div class="modal-body" id="modal-body"></div>

      <div class="modal-footer">
        <div class="qty-control">
          <button class="qty-btn" id="qty-minus">−</button>
          <span class="qty-val" id="qty-val">1</span>
          <button class="qty-btn" id="qty-plus">+</button>
        </div>
        <button class="add-btn" id="add-btn">AÑADIR AL PEDIDO</button>
      </div>

    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       CART PAGE (slide-in overlay)
  ══════════════════════════════════════════════════════ -->
  <div class="cart-page" id="cart-page">

    <!-- Cart Header (same branding) -->
    <header class="site-header">
      <div class="header-inner">
        <img src="img/Logo AAHSM 01.webp" alt="Adictos al Humo Smokehouse" class="header-logo" />
        <div class="header-right-slot">
          <button class="currency-switch is-bs" id="cart-currency-btn" aria-label="Cambiar moneda">

            <span class="csw-opt csw-bs">Bs.</span>
            <div class="csw-slider"></div>
          </button>
          <span class="header-descuento-tag" id="cart-descuentos-tag" style="visibility:hidden">&#x2014; DESCUENTOS &#x2014;</span>
        </div>
      </div>
    </header>

    <!-- Sub-header: back + total -->
    <div class="cart-subheader">
      <button class="cart-back" id="cart-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        ATRÁS
      </button>
      <div class="cart-header-right">
        <span class="cart-header-label">Tu carrito</span>
        <span class="cart-header-total" id="cart-header-total">$0.00</span>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="cart-content">

      <!-- Items list -->
      <div class="cart-items-list" id="cart-items-list"></div>

      <!-- Complementa tu pedido -->
      <div class="cart-complementa">
        <h3 class="complementa-title">COMPLEMENTA TU PEDIDO</h3>
        <div class="complementa-scroll" id="complementa-scroll"></div>
      </div>

    </div><!-- /cart-content -->

    <!-- Service type (fixed footer) -->
    <div class="cart-service">
      <p class="service-label">Selecciona el tipo de servicio:</p>
