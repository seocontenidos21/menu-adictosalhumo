<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080808" />
  <title>Adictos al Humo — Próximamente</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #cc1111;
      --bg: #080808;
      --white: #f2f2f2;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      overflow: hidden;
    }

    /* Smoke background particles */
    .smoke {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .smoke span {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      background: rgba(204,17,17,0.12);
      animation: rise linear infinite;
    }
    .smoke span:nth-child(1)  { left: 10%;  width: 80px;  height: 80px;  animation-duration: 9s;  animation-delay: 0s;   }
    .smoke span:nth-child(2)  { left: 30%;  width: 50px;  height: 50px;  animation-duration: 12s; animation-delay: 2s;   }
    .smoke span:nth-child(3)  { left: 55%;  width: 100px; height: 100px; animation-duration: 8s;  animation-delay: 1s;   }
    .smoke span:nth-child(4)  { left: 75%;  width: 60px;  height: 60px;  animation-duration: 14s; animation-delay: 3s;   }
    .smoke span:nth-child(5)  { left: 90%;  width: 40px;  height: 40px;  animation-duration: 10s; animation-delay: 0.5s; }
    @keyframes rise {
      0%   { transform: translateY(0)   scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-110vh) scale(2.5); opacity: 0; }
    }

    /* Content */
    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo svg { width: 36px; height: 44px; flex-shrink: 0; }
    .logo-text { text-align: left; }
    .logo-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .logo-title .accent { color: var(--red); }
    .logo-sub {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--muted);
    }

    /* Divider line */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--red);
      margin: 0 auto 32px;
      border-radius: 1px;
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 12vw, 64px);
      letter-spacing: 0.04em;
      line-height: 0.95;
      margin-bottom: 16px;
    }
    .headline .fire { color: var(--red); }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* Grill icon */
    .grill-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 32px;
      opacity: 0.18;
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: rgba(204,17,17,0.12);
      border: 1px solid rgba(204,17,17,0.3);
      border-radius: 100px;
      padding: 10px 24px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e05555;
      font-weight: 500;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: #444;
      z-index: 1;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="smoke" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="card">

    <div class="logo">
      <svg viewBox="0 0 40 48" fill="none" aria-hidden="true">
        <path d="M20 4C20 4 28 14 28 22C28 30 24 36 20 40C16 36 12 30 12 22C12 14 20 4 20 4Z" fill="#cc1111"/>
        <path d="M20 14C20 14 24 20 24 25C24 30 22 33 20 36C18 33 16 30 16 25C16 20 20 14 20 14Z" fill="#ff6633" opacity="0.8"/>
        <ellipse cx="20" cy="42" rx="10" ry="3" fill="#cc1111" opacity="0.3"/>
      </svg>
      <div class="logo-text">
        <div class="logo-title">ADICTOS <span class="accent">AL</span> HUMO</div>
        <div class="logo-sub">SMOKEHOUSE</div>
      </div>
    </div>

    <div class="divider"></div>

    <svg class="grill-icon" viewBox="0 0 72 72" fill="none" aria-hidden="true">
      <rect x="8" y="28" width="56" height="4" rx="2" fill="#f2f2f2"/>
      <rect x="8" y="36" width="56" height="4" rx="2" fill="#f2f2f2"/>
      <rect x="8" y="44" width="56" height="4" rx="2" fill="#f2f2f2"/>
      <rect x="18" y="24" width="4" height="28" rx="2" fill="#f2f2f2"/>
      <rect x="30" y="24" width="4" height="28" rx="2" fill="#f2f2f2"/>
      <rect x="42" y="24" width="4" height="28" rx="2" fill="#f2f2f2"/>
      <rect x="54" y="24" width="4" height="28" rx="2" fill="#f2f2f2"/>
      <path d="M12 52 L20 68 M60 52 L52 68" stroke="#f2f2f2" stroke-width="3" stroke-linecap="round"/>
      <rect x="8" y="20" width="56" height="6" rx="3" fill="#cc1111" opacity="0.7"/>
    </svg>

    <h1 class="headline">PRONTO<br><span class="fire">EN LLAMAS</span></h1>

    <p class="subtitle">
      Nuestro menú digital está en el horno.<br>
      Muy pronto podrás explorar todo lo que tenemos para ti.
    </p>

    <span class="badge">Próximamente</span>

  </div>

  <footer>ADICTOS AL HUMO SMOKEHOUSE &nbsp;·&nbsp; MÉRIDA, VENEZUELA</footer>

</body>
</html>
