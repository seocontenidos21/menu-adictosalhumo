<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080808" />
  <title>Adictos al Humo — Menú</title>
  <meta name="description" content="Menú digital de Adictos al Humo Smokehouse. Ahumados texanos, BBQ y más." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════════
       MAIN MENU VIEW
  ══════════════════════════════════════════════════════ -->

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <svg class="logo-flame" viewBox="0 0 40 48" fill="none" aria-hidden="true">
        <path d="M20 4C20 4 28 14 28 22C28 30 24 36 20 40C16 36 12 30 12 22C12 14 20 4 20 4Z" fill="#cc1111"/>
        <path d="M20 14C20 14 24 20 24 25C24 30 22 33 20 36C18 33 16 30 16 25C16 20 20 14 20 14Z" fill="#ff6633" opacity="0.8"/>
        <ellipse cx="20" cy="42" rx="10" ry="3" fill="#cc1111" opacity="0.3"/>
      </svg>
      <div class="logo-text">
        <div class="logo-title">ADICTOS <span class="accent">AL</span> HUMO</div>
        <div class="logo-sub">SMOKEHOUSE</div>
      </div>
    </div>
  </header>

  <!-- Section Nav -->
  <nav class="section-nav" aria-label="Secciones del menú">
    <div class="nav-pills" id="nav-pills"></div>
  </nav>

  <!-- Menu Content -->
  <main class="menu-main" id="menu-content" aria-live="polite"></main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-divider"></div>
    <div class="footer-links">
      <a class="footer-link" href="https://instagram.com/adictosalhumo" target="_blank" rel="noopener">
        <span class="footer-link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </span>
        @adictosalhumo
      </a>
      <a class="footer-link" href="tel:+584209671491">
        <span class="footer-link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </span>
        +58 420 967 191
      </a>
      <a class="footer-link" href="http://www.adictosalhumo.ve" target="_blank" rel="noopener">
        <span class="footer-link-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </span>
        www.adictosalhumo.ve
      </a>
    </div>
    <p class="footer-tagline">LOW &amp; SLOW · TEXAS TRADITION · VENEZUELAN SOUL</p>
  </footer>

  <!-- Rate Bar -->
  <div class="rate-bar" id="rate-bar" aria-live="polite">
    Tasa: <strong>Bs. <span id="rate-value">--</span></strong> / $1
    &nbsp;·&nbsp; <span id="rate-date">--</span>
  </div>

  <!-- Cart FAB -->
  <button class="fab-cart" id="cart-fab" aria-label="Ver carrito">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 001.97 1.61h9.72a2 2 0 001.97-1.61L23 6H6"/>
    </svg>
    <span class="cart-badge" id="cart-badge" hidden>0</span>
  </button>

  <!-- Currency Pill -->
  <button class="currency-pill" id="currency-toggle" aria-label="Cambiar moneda">
    <span class="cpill-dot"></span>
    <span class="cpill-text">$ USD</span>
  </button>


  <!-- ══════════════════════════════════════════════════════
       PRODUCT DETAIL MODAL (bottom sheet)
  ══════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-sheet" id="modal-sheet">

      <button class="modal-close" id="modal-close" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>

      <div class="modal-body" id="modal-body"></div>

      <div class="modal-footer">
        <div class="qty-control">
          <button class="qty-btn" id="qty-minus">−</button>
          <span class="qty-val" id="qty-val">1</span>
          <button class="qty-btn" id="qty-plus">+</button>
        </div>
        <button class="add-btn" id="add-btn">AÑADIR AL PEDIDO</button>
      </div>

    </div>
  </div>


  <!-- ══════════════════════════════════════════════════════
       CART PAGE (slide-in overlay)
  ══════════════════════════════════════════════════════ -->
  <div class="cart-page" id="cart-page">

    <!-- Cart Header (same branding) -->
    <header class="site-header">
      <div class="header-inner">
        <svg class="logo-flame" viewBox="0 0 40 48" fill="none" aria-hidden="true">
          <path d="M20 4C20 4 28 14 28 22C28 30 24 36 20 40C16 36 12 30 12 22C12 14 20 4 20 4Z" fill="#cc1111"/>
          <path d="M20 14C20 14 24 20 24 25C24 30 22 33 20 36C18 33 16 30 16 25C16 20 20 14 20 14Z" fill="#ff6633" opacity="0.8"/>
          <ellipse cx="20" cy="42" rx="10" ry="3" fill="#cc1111" opacity="0.3"/>
        </svg>
        <div class="logo-text">
          <div class="logo-title">ADICTOS <span class="accent">AL</span> HUMO</div>
          <div class="logo-sub">SMOKEHOUSE</div>
        </div>
      </div>
    </header>

    <!-- Sub-header: back + total -->
    <div class="cart-subheader">
      <button class="cart-back" id="cart-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        ATRÁS
      </button>
      <div class="cart-header-right">
        <span class="cart-header-label">Tu carrito</span>
        <span class="cart-header-total" id="cart-header-total">$0.00</span>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="cart-content">

      <!-- Items list -->
      <div class="cart-items-list" id="cart-items-list"></div>

      <!-- Complementa tu pedido -->
      <div class="cart-complementa">
        <h3 class="complementa-title">COMPLEMENTA TU PEDIDO</h3>
        <div class="complementa-scroll" id="complementa-scroll"></div>
      </div>

      <!-- Service type -->
      <div class="cart-service">
        <p class="service-label">Selecciona el tipo de servicio:</p>
        <div class="service-btns">
          <button class="service-btn active" data-service="local">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            EN EL LOCAL
          </button>
          <button class="service-btn" data-service="llevar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            PARA LLEVAR
          </button>
          <button class="service-btn" data-service="domicilio">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            A DOMICILIO
          </button>
        </div>
      </div>

    </div><!-- /cart-content -->
  </div><!-- /cart-page -->


  <script src="js/config.js"></script>
  <script src="js/menu-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
